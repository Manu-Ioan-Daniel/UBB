<section>
    <h2>Formular rapid de antrenament</h2>
    <p>Completeaza cele 7 campuri pentru un plan scurt si clar.</p>

    <form id = "formular" name="formular" action="#" method="post" novalidate>
        <fieldset>
            <legend><b>Profil de baza</b></legend>

            <div>
                <label for="nume">Nume complet:</label>
                <input type="text" id="nume" name="nume" maxlength="40" required>
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="varsta">Varsta:</label>
                <input type="number" id="varsta" name="varsta" min="1" max="100" step="1" required>
            </div>

            <div>
                <label for="nivel">Nivel pregatire:</label>
                <select id="nivel" name="nivel" required>
                    <option value="">Alege nivelul</option>
                    <option value="incepator">Incepator</option>
                    <option value="intermediar">Intermediar</option>
                    <option value="avansat">Avansat</option>
                </select>
            </div>

            <div>
                <label for="obiectiv">Obiectiv principal:</label>
                <select id="obiectiv" name="obiectiv" required>
                    <option value="">Alege obiectivul</option>
                    <option value="forta">Forta</option>
                    <option value="masa">Masa musculara</option>
                    <option value="mobilitate">Mobilitate</option>
                    <option value="rezistenta">Rezistenta</option>
                </select>
            </div>

            <div>
                <label for="data-start">Data inceperii:</label>
                <input type="date" id="data-start" name="data-start" required>
            </div>

            <div>
                <label for="observatii">Observatii:</label>
                <textarea id="observatii" name="observatii" rows="4" cols="32" maxlength="250" required></textarea>
            </div>

            <div>
                <input type="submit" value="Trimite formularul">
            </div>
        </fieldset>
    </form>
</section>
